<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Programando o Futuro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="meu-topo">
    <img src="logo programando.jpg" alt="Logo" class="logo-topo">
    <h1 class="titulo-centro">Programando o Futuro</h1>
    <div class="vazio"></div>
</header>

<section class="name-screen" id="name-screen">
    <div class="eyebrow">CENTRO DE METARRECICLAGEM</div>
    <h1>Quiz da <em>Programando o Futuro</em></h1>
    <p class="name-desc">Teste seus conhecimentos sobre o que você aprendeu hoje.</p>
    
    <div class="meta-row">
        <div class="meta-item"><span class="meta-label">Perguntas</span><span class="meta-value">12</span></div>
        <div class="meta-item"><span class="meta-label">Nível</span><span class="meta-value">Fácil</span></div>
        <div class="meta-item"><span class="meta-label">Tempo</span><span class="meta-value">5–8 min</span></div>
    </div>

    <div class="name-form">
        <label class="name-label" for="student-name">Seu nome completo</label>
        <input class="name-input" type="text" id="student-name" placeholder="Ex: Maria Silva" oninput="checkName()">
        <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>
            Iniciar quiz
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
    </div>
</section>

<div class="quiz-wrap" id="quiz-wrap" style="display:none">
    <div class="progress-sticky">
        <div class="prog-header">
            <span class="prog-label">Progresso</span>
            <span class="prog-frac" id="prog-frac">1 / 12</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div id="q-container"></div>

    <div class="nav-row">
        <button class="nav-btn" id="btn-prev" onclick="navigate(-1)" disabled>Anterior</button>
        <div class="dots" id="dots"></div>
        <button class="nav-btn primary" id="btn-next">Confirmar Resposta</button>
    </div>
</div>

<div class="result-wrap" id="result-wrap" style="display:none">
    <div class="result-hero">
        <div class="result-eyebrow">Seu resultado</div>
        <div class="result-score" id="result-score">0%</div>
        <p class="result-pct" id="result-text"></p>
    </div>
    <button class="restart-btn" onclick="location.reload()">Tentar novamente</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz de Design Gráfico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<header class="meu-topo">
    <img src="logo programando.jpg" alt="Logo" class="logo-topo">

    <h1 class="titulo-centro">Programando o Futuro</h1>

    <div class="vazio"></div>
</header>
</head>
<body>

<!-- TELA DE NOME -->
<section class="name-screen" id="name-screen">
  <div class="eyebrow">Educação em Design</div>
  <h1>Quiz de <em>Design</em> Gráfico</h1>
  <p class="name-desc">Teste seus conhecimentos sobre os fundamentos do design gráfico. Dez perguntas para iniciantes.</p>
  <div class="meta-row">
    <div class="meta-item"><span class="meta-label">Perguntas</span><span class="meta-value">10</span></div>
    <div class="meta-item"><span class="meta-label">Nível</span><span class="meta-value">Iniciante</span></div>
    <div class="meta-item"><span class="meta-label">Tempo</span><span class="meta-value">5–8 min</span></div>
  </div>
  <div class="name-form">
    <label class="name-label" for="student-name">Seu nome completo</label>
    <input class="name-input" type="text" id="student-name" placeholder="Ex: Maria Silva" autocomplete="name" oninput="checkName()">
    <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>
      Iniciar quiz
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</section>

<!-- QUIZ -->
<div class="quiz-wrap" id="quiz-wrap">
  <div class="progress-sticky">
    <div class="prog-header">
      <span class="prog-label">Progresso</span>
      <span class="prog-frac" id="prog-frac">1 / 10</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:10%"></div></div>
  </div>
  <div id="q-container"></div>
  <div class="nav-row">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)" disabled>
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13 8H3M7 12l-4-4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Anterior
    </button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">
      Próxima
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<!-- RESULTADO PESSOAL -->
<div class="result-wrap" id="result-wrap">
  <div class="result-hero">
    <div class="result-eyebrow">Seu resultado</div>
    <div class="result-score" id="r-score">0<span>/10</span></div>
    <div class="result-pct" id="r-pct"></div>
    <div class="result-msg" id="r-msg"></div>
  </div>

  <div class="section-label" style="margin-bottom:1.5rem">Revisão das respostas</div>
  <div class="answer-review" id="answer-review"></div>

  <button class="restart-btn" onclick="restart()">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 1 0 1.5-3.9M2 4v4h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Tentar novamente
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/** Substitua pelos dados do seu projeto: Supabase → Settings → API **/
const SUPABASE_URL = 'https://oyzvubeeimcpccvhoyvx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95enZ1YmVlaW1jcGNjdmhveXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0ODE3ODEsImV4cCI6MjA5MDA1Nzc4MX0.4i9nIM-s39PtL5hJ37ReFHAF_P7yfoecnJF7dkl4-Sc';

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const LETTERS = ['A','B','C','D'];

const Q = [
  { q:"O que é design gráfico?", opts:["A arte de programar sites e aplicativos","A prática de comunicar visualmente ideias usando imagens, cores e tipografia","O processo de fotografar produtos para publicidade","Uma técnica de impressão industrial em larga escala"], answer:1, tip:"Design gráfico é comunicação visual — unir elementos como imagens, cores e texto para transmitir uma mensagem de forma clara e eficaz." },
  { q:"Quais são as cores primárias no modelo de impressão (pigmento)?", opts:["Vermelho, verde e azul","Ciano, magenta e amarelo","Laranja, roxo e verde","Branco, preto e cinza"], answer:1, tip:"No modelo subtrativo (impressão), as cores primárias são ciano, magenta e amarelo — a base do sistema CMYK usado em impressoras." },
  { q:"O que é tipografia no design gráfico?", opts:["A técnica de criar fotografias artísticas","O estudo e uso de fontes e textos de forma visual e comunicativa","O processo de escolher paletas de cores para uma marca","A arte de desenhar ilustrações à mão livre"], answer:1, tip:"Tipografia é a seleção e o arranjo visual de fontes para tornar o texto legível, hierárquico e esteticamente agradável." },
  { q:"O que é 'espaço negativo' em composição visual?", opts:["Cores escuras usadas no fundo de uma peça gráfica","O espaço vazio ao redor e entre os elementos da composição","Um tipo de filtro fotográfico em preto e branco","A margem mínima exigida por gráficas para impressão"], answer:1, tip:"Espaço negativo é a área vazia ao redor dos elementos — essencial para respiração visual e equilíbrio na composição." },
  { q:"Qual formato de imagem suporta fundo transparente, ideal para logos?", opts:["JPG","BMP","PNG","TIFF"], answer:2, tip:"O PNG suporta transparência de fundo (canal alfa), sendo ideal para logos e ícones sobrepostos a diferentes fundos." },
  { q:"No Canva, o que é um 'template'?", opts:["Um banco de fontes gratuitas para download","Um modelo de design pré-criado que pode ser personalizado","Uma ferramenta para edição profissional de fotos","Um tipo de arquivo exportado em formato PDF"], answer:1, tip:"Templates são modelos prontos que servem como ponto de partida, facilitando a criação sem começar do zero." },
  { q:"Qual princípio diz que elementos relacionados devem ficar próximos?", opts:["Contraste","Repetição","Proximidade","Alinhamento"], answer:2, tip:"O princípio da proximidade afirma que elementos próximos são percebidos como relacionados, organizando visualmente as informações." },
  { q:"O que é identidade visual de uma marca?", opts:["O conjunto de elementos visuais (logo, cores, fontes) que identificam uma marca","O número de seguidores nas redes sociais de uma empresa","O catálogo completo de produtos vendidos por uma empresa","O histórico de campanhas publicitárias de uma marca"], answer:0, tip:"Identidade visual é o sistema gráfico que representa uma marca: logo, paleta de cores, tipografia e outros elementos visuais." },
  { q:"O que são cores análogas no círculo cromático?", opts:["Cores diretamente opostas no círculo cromático","Cores que ficam lado a lado no círculo cromático","As três cores primárias reunidas","Tons de cinza em diferentes intensidades"], answer:1, tip:"Cores análogas são vizinhas no círculo cromático (ex: azul, azul-verde e verde) e criam harmonia e coesão visual." },
  { q:"Qual é a função do 'alinhamento' como princípio de design?", opts:["Criar contraste entre elementos usando cores opostas","Repetir elementos visuais para criar ritmo na composição","Organizar elementos em relação a um eixo, criando ordem visual","Aumentar o tamanho dos elementos mais importantes"], answer:2, tip:"O alinhamento conecta os elementos a um eixo visual, criando ordem, limpeza e coesão — tornando o layout mais profissional." }
];

let studentName = '';
let current = 0;
let answers = new Array(10).fill(null);

function checkName() {
  const v = document.getElementById('student-name').value.trim();
  document.getElementById('start-btn').disabled = v.length < 2;
}

function startQuiz() {
  studentName = document.getElementById('student-name').value.trim();
  if (studentName.length < 2) return;
  document.getElementById('name-screen').style.display = 'none';
  document.getElementById('quiz-wrap').style.display = 'block';
  renderQ();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderQ() {
  const q = Q[current];
  const ua = answers[current];
  const answered = ua !== null;

  document.getElementById('prog-frac').textContent = `${current + 1} / 10`;
  document.getElementById('prog-fill').style.width = `${((current + 1) / 10) * 100}%`;

  let html = `<div class="q-block">
    <div class="q-num">0${current + 1}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">`;

  q.opts.forEach((opt, i) => {
    let cls = '';
    if (answered) {
      if (i === q.answer) cls = 'correct';
      else if (i === ua) cls = 'wrong';
      else cls = 'dimmed';
    }
    html += `<button class="opt-btn ${cls}" ${answered ? 'disabled' : ''} onclick="pick(${i})">
      <span class="opt-letter">${LETTERS[i]}</span>
      <span class="opt-text">${opt}</span>
    </button>`;
  });

  html += `</div>`;
  if (answered) {
    const ok = ua === q.answer;
    html += `<div class="feedback ${ok ? '' : 'wrong-fb'}" style="display:block">
      <strong>${ok ? '✓ Correto!' : '✗ Incorreto.'}</strong> ${q.tip}
    </div>`;
  }
  html += `</div>`;

  document.getElementById('q-container').innerHTML = html;
  document.getElementById('btn-prev').disabled = current === 0;

  const nextBtn = document.getElementById('btn-next');
  const allDone = answers.every(a => a !== null);
  if (current === 9) {
    if (allDone) {
      nextBtn.innerHTML = `Ver resultado <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      nextBtn.onclick = showResult;
      nextBtn.disabled = false;
    } else { nextBtn.disabled = true; }
  } else {
    nextBtn.innerHTML = `Próxima <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    nextBtn.onclick = () => navigate(1);
    nextBtn.disabled = false;
  }

  let dotsHtml = '';
  Q.forEach((_, i) => {
    const cls = (answers[i] !== null ? 'answered' : '') + (i === current ? ' active' : '');
    dotsHtml += `<div class="dot ${cls}" onclick="jumpTo(${i})"></div>`;
  });
  document.getElementById('dots').innerHTML = dotsHtml;
}

function jumpTo(i) { current = i; renderQ(); }
function navigate(d) {
  const n = current + d;
  if (n < 0 || n > 9) return;
  current = n; renderQ();
}

function pick(i) {
  if (answers[current] !== null) return;
  answers[current] = i;
  renderQ();
  if (current === 9 && answers.every(a => a !== null)) {
    const nb = document.getElementById('btn-next');
    nb.innerHTML = `Ver resultado <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    nb.onclick = showResult; nb.disabled = false;
  }
}

async function showResult() {
  const correct = answers.filter((a, i) => a === Q[i].answer).length;
  const wrong = 10 - correct;
  const pct = Math.round((correct / 10) * 100);
  const nota = Number(((correct / 10) * 10).toFixed(1));

  const row = {
    nome: studentName.trim(),
    acertos: correct,
    erros: wrong,
    nota,
    respostas: [...answers]
  };

  const { error } = await supabaseClient.from('resultados').insert(row);
  if (error) {
    console.error(error);
    const det = [error.message, error.details, error.hint].filter(Boolean).join(' — ');
    alert('Não foi possível salvar no Supabase.\n\n' + det + '\n\n(Abra F12 → Console para mais detalhes.)');
  }

  document.getElementById('quiz-wrap').style.display = 'none';
  document.getElementById('result-wrap').style.display = 'block';

  document.getElementById('r-score').innerHTML = `${correct}<span>/10</span>`;
  document.getElementById('r-pct').textContent = `${pct}% de acertos`;

  let msg = '';
  if (pct >= 90) msg = '"Excelente! Você domina os fundamentos do design gráfico."';
  else if (pct >= 70) msg = '"Muito bom! Você tem uma base sólida para evoluir."';
  else if (pct >= 50) msg = '"Bom começo! Continue estudando os conceitos essenciais."';
  else msg = '"Não desanime! Revise os conteúdos e tente novamente."';
  document.getElementById('r-msg').textContent = msg;

  let reviewHtml = '';
  Q.forEach((q, i) => {
    const ok = answers[i] === q.answer;
    reviewHtml += `<div class="review-item ${ok ? 'hit' : 'miss'}">
      <div class="review-header">
        <div class="review-q">${i + 1}. ${q.q}</div>
        <span class="review-badge">${ok ? '✓ Acerto' : '✗ Erro'}</span>
      </div>
      <div class="review-answers">
        ${!ok ? `<div class="review-wrong">Sua resposta: ${LETTERS[answers[i]]} — ${q.opts[answers[i]]}</div>` : ''}
        <div class="review-correct">Resposta correta: ${LETTERS[q.answer]} — ${q.opts[q.answer]}</div>
      </div>
      <div class="review-tip">${q.tip}</div>
    </div>`;
  });
  document.getElementById('answer-review').innerHTML = reviewHtml;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  answers = new Array(10).fill(null);
  current = 0;
  studentName = '';
  document.getElementById('student-name').value = '';
  document.getElementById('start-btn').disabled = true;
  document.getElementById('result-wrap').style.display = 'none';
  document.getElementById('name-screen').style.display = 'flex';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
